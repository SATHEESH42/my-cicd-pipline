name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.satheesh45 }}
          password: ${{ secrets.SATHEESH@420 }}

      - name: Pull Backend Image
        run: docker pull satheesh45/backend:v1.0

      - name: Run Container
        run: |
          docker stop backend || true
          docker rm backend || true
          docker run -d -p 80:3000 --name backend satheesh45/backend:v1.0